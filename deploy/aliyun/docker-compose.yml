# =============================================================================
# uzApi Aliyun Production Compose
# =============================================================================

services:
  uzapi:
    image: ${APP_IMAGE:-uzapi/uzapi}:${APP_IMAGE_TAG:-aliyun-latest}
    container_name: uzapi-app
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      AUTO_SETUP: "true"
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      SERVER_MODE: ${SERVER_MODE:-release}
      RUN_MODE: ${RUN_MODE:-standard}
      DATA_DIR: /app/data
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER:-uzapi}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      DATABASE_DBNAME: ${DATABASE_DBNAME:-uzapi}
      DATABASE_SSLMODE: ${DATABASE_SSLMODE:-disable}
      DATABASE_MAX_OPEN_CONNS: ${DATABASE_MAX_OPEN_CONNS:-100}
      DATABASE_MAX_IDLE_CONNS: ${DATABASE_MAX_IDLE_CONNS:-20}
      DATABASE_CONN_MAX_LIFETIME_MINUTES: ${DATABASE_CONN_MAX_LIFETIME_MINUTES:-30}
      DATABASE_CONN_MAX_IDLE_TIME_MINUTES: ${DATABASE_CONN_MAX_IDLE_TIME_MINUTES:-5}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_ENABLE_TLS: ${REDIS_ENABLE_TLS:-false}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-1024}
      REDIS_MIN_IDLE_CONNS: ${REDIS_MIN_IDLE_CONNS:-10}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@uzapi.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required on first deploy}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRE_HOUR: ${JWT_EXPIRE_HOUR:-24}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY:?TOTP_ENCRYPTION_KEY is required}
      TZ: ${TZ:-Asia/Shanghai}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - uzapi_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - uzapi
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: uzapi-caddy
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required, use :80 for IP-only test or api.example.com for HTTPS}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      uzapi:
        condition: service_healthy
    networks:
      - uzapi

  postgres:
    image: postgres:18-alpine
    container_name: uzapi-postgres
    restart: unless-stopped
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_USER: ${DATABASE_USER:-uzapi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      POSTGRES_DB: ${DATABASE_DBNAME:-uzapi}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - uzapi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-uzapi} -d ${DATABASE_DBNAME:-uzapi}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8-alpine
    container_name: uzapi-redis
    restart: unless-stopped
    command: >
      sh -c '
        if [ -n "$${REDIS_PASSWORD}" ]; then
          redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}" --maxclients 20000;
        else
          redis-server --appendonly yes --maxclients 20000;
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - redis_data:/data
    networks:
      - uzapi
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  uzapi:
    name: uzapi-network

volumes:
  uzapi_data:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
