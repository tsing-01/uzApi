name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: aliyun-production
  cancel-in-progress: false

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image metadata
        id: image
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          TAG="${GITHUB_SHA}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using image: $IMAGE:$TAG"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.image }}:aliyun-latest
          build-args: |
            COMMIT=${{ github.sha }}
            GOPROXY=https://goproxy.cn,direct
            GOSUMDB=sum.golang.google.cn
            VITE_API_BASE_URL=https://api.uzapi.org/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Sync and deploy on Aliyun ECS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure SSH
        env:
          ALIYUN_SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
        run: |
          if [ -z "$ALIYUN_HOST" ]; then
            echo "ALIYUN_HOST secret is required."
            exit 1
          fi
          if [ -z "$ALIYUN_SSH_KEY" ]; then
            echo "ALIYUN_SSH_KEY secret is required."
            exit 1
          fi
          if ! [[ "$ALIYUN_PORT" =~ ^[0-9]+$ ]]; then
            echo "ALIYUN_PORT must be a numeric TCP port."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$ALIYUN_SSH_KEY" | tr -d '\r' > ~/.ssh/aliyun_key
          chmod 600 ~/.ssh/aliyun_key
          if ! ssh-keyscan -T 15 -p "$ALIYUN_PORT" -H "$ALIYUN_HOST" >> ~/.ssh/known_hosts; then
            echo "Failed to scan SSH host key for $ALIYUN_HOST:$ALIYUN_PORT."
            echo "Check ALIYUN_HOST, ALIYUN_PORT, ECS security group/firewall, and whether sshd is listening."
            exit 1
          fi

      - name: Upload repository snapshot
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER || 'root' }}
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
          ALIYUN_APP_DIR: ${{ secrets.ALIYUN_APP_DIR || '/opt/uzapi' }}
        run: |
          SSH_OPTS="-i ~/.ssh/aliyun_key -p $ALIYUN_PORT -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          ssh $SSH_OPTS "$ALIYUN_USER@$ALIYUN_HOST" "mkdir -p '$ALIYUN_APP_DIR'"
          tar \
            --exclude='deploy/aliyun/.env.production' \
            -czf - \
            deploy/aliyun \
            scripts/aliyun-deploy.sh \
            scripts/backup-db.sh \
            | ssh $SSH_OPTS "$ALIYUN_USER@$ALIYUN_HOST" "tar -xzf - -C '$ALIYUN_APP_DIR'"

      - name: Deploy
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER || 'root' }}
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
          ALIYUN_APP_DIR: ${{ secrets.ALIYUN_APP_DIR || '/opt/uzapi' }}
          APP_IMAGE_TAG: ${{ github.sha }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          SSH_OPTS="-i ~/.ssh/aliyun_key -p $ALIYUN_PORT -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          APP_IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          test -n "$APP_IMAGE"
          test -n "$APP_IMAGE_TAG"
          if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
            printf '%s' "$GHCR_TOKEN" | ssh $SSH_OPTS "$ALIYUN_USER@$ALIYUN_HOST" "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"
          fi
          ssh $SSH_OPTS "$ALIYUN_USER@$ALIYUN_HOST" "cd '$ALIYUN_APP_DIR' && test -f scripts/aliyun-deploy.sh && chmod +x scripts/aliyun-deploy.sh && if [ -f scripts/backup-db.sh ]; then chmod +x scripts/backup-db.sh; fi && APP_IMAGE='$APP_IMAGE' APP_IMAGE_TAG='$APP_IMAGE_TAG' ./scripts/aliyun-deploy.sh"
