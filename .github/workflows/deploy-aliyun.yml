name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: aliyun-production
  cancel-in-progress: false

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image metadata
        id: image
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          TAG="${GITHUB_SHA}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using image: $IMAGE:$TAG"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.image }}:aliyun-latest
          build-args: |
            COMMIT=${{ github.sha }}
            GOPROXY=https://goproxy.cn,direct
            GOSUMDB=sum.golang.google.cn
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Sync and deploy on Aliyun ECS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure SSH
        env:
          ALIYUN_SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
        run: |
          test -n "$ALIYUN_HOST"
          test -n "$ALIYUN_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$ALIYUN_SSH_KEY" > ~/.ssh/aliyun_key
          chmod 600 ~/.ssh/aliyun_key
          ssh-keyscan -p "$ALIYUN_PORT" -H "$ALIYUN_HOST" >> ~/.ssh/known_hosts

      - name: Upload repository snapshot
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER || 'root' }}
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
          ALIYUN_APP_DIR: ${{ secrets.ALIYUN_APP_DIR || '/opt/uzapi' }}
        run: |
          SSH_OPTS="-i ~/.ssh/aliyun_key -p $ALIYUN_PORT -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          ssh $SSH_OPTS "$ALIYUN_USER@$ALIYUN_HOST" "mkdir -p '$ALIYUN_APP_DIR'"
          tar \
            --exclude='.git' \
            --exclude='frontend/node_modules' \
            --exclude='backend/bin' \
            --exclude='deploy/postgres_data_local' \
            --exclude='deploy/aliyun/.env.production' \
            -czf - . \
            | ssh $SSH_OPTS "$ALIYUN_USER@$ALIYUN_HOST" "tar -xzf - -C '$ALIYUN_APP_DIR'"

      - name: Deploy
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER || 'root' }}
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
          ALIYUN_APP_DIR: ${{ secrets.ALIYUN_APP_DIR || '/opt/uzapi' }}
          APP_IMAGE: ${{ needs.build.outputs.image }}
          APP_IMAGE_TAG: ${{ needs.build.outputs.tag }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          SSH_OPTS="-i ~/.ssh/aliyun_key -p $ALIYUN_PORT -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
            printf '%s' "$GHCR_TOKEN" | ssh $SSH_OPTS "$ALIYUN_USER@$ALIYUN_HOST" "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"
          fi
          ssh $SSH_OPTS "$ALIYUN_USER@$ALIYUN_HOST" "cd '$ALIYUN_APP_DIR' && test -f scripts/aliyun-deploy.sh && chmod +x scripts/aliyun-deploy.sh && if [ -f scripts/backup-db.sh ]; then chmod +x scripts/backup-db.sh; fi && APP_IMAGE='$APP_IMAGE' APP_IMAGE_TAG='$APP_IMAGE_TAG' ./scripts/aliyun-deploy.sh"
