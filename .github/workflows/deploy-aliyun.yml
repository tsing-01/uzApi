name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aliyun-production
  cancel-in-progress: false

jobs:
  validate:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: uzapi/uzapi:ci-${{ github.sha }}
          build-args: |
            COMMIT=${{ github.sha }}
            GOPROXY=https://goproxy.cn,direct
            GOSUMDB=sum.golang.google.cn
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Sync and deploy on Aliyun ECS
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure SSH
        env:
          ALIYUN_SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
        run: |
          test -n "$ALIYUN_HOST"
          test -n "$ALIYUN_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$ALIYUN_SSH_KEY" > ~/.ssh/aliyun_key
          chmod 600 ~/.ssh/aliyun_key
          ssh-keyscan -p "$ALIYUN_PORT" -H "$ALIYUN_HOST" >> ~/.ssh/known_hosts

      - name: Upload repository snapshot
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER || 'root' }}
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
          ALIYUN_APP_DIR: ${{ secrets.ALIYUN_APP_DIR || '/opt/uzapi' }}
        run: |
          ssh -i ~/.ssh/aliyun_key -p "$ALIYUN_PORT" "$ALIYUN_USER@$ALIYUN_HOST" "mkdir -p '$ALIYUN_APP_DIR'"
          tar \
            --exclude='.git' \
            --exclude='frontend/node_modules' \
            --exclude='backend/bin' \
            --exclude='deploy/postgres_data_local' \
            --exclude='deploy/aliyun/.env.production' \
            -czf - . \
            | ssh -i ~/.ssh/aliyun_key -p "$ALIYUN_PORT" "$ALIYUN_USER@$ALIYUN_HOST" "tar -xzf - -C '$ALIYUN_APP_DIR'"

      - name: Deploy
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER || 'root' }}
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
          ALIYUN_APP_DIR: ${{ secrets.ALIYUN_APP_DIR || '/opt/uzapi' }}
        run: |
          ssh -i ~/.ssh/aliyun_key -p "$ALIYUN_PORT" "$ALIYUN_USER@$ALIYUN_HOST" "cd '$ALIYUN_APP_DIR' && chmod +x scripts/aliyun-deploy.sh scripts/backup-db.sh && ./scripts/aliyun-deploy.sh"
